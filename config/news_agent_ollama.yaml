model:
  backend: ollama
  api_key_env: ""
  question_analysis_model_id: gemma4:e4b
  query_planning_model_id: gemma4:e4b
  candidate_filter_model_id: gemma4:e4b
  article_selection_model_id: gemma4:e4b
  metric_extraction_model_id: gemma4:e4b
  summary_model_id: gemma4:e4b
  max_output_tokens: 2048
  temperature: 0.1
  base_url: "http://127.0.0.1:11434"
  request_timeout_seconds: 240

search:
  provider: google_news_rss
  days_back: 90
  max_sources: 6
  max_search_calls_per_run: 1
  candidate_pool_size: 10
  request_timeout_seconds: 12
  user_agent: "news-agent/0.1 (+local learning project)"
  # Keep direct publisher RSS only; Google News URLs often redirect to consent pages in Europe.
  allow_google_news_fallback: false

outlets_file: outlets/free_outlets.yaml

