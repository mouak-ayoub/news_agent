# Hybrid config: use Gemma through the Gemini API for reasoning steps,
# and use OpenAI only for the web-search retrieval call.
#
# YAML is used here because you asked for a config format that is easy to read
# and edit in the `config/` folder.

model:
  backend: gemini
  api_key_env: GEMINI_API_KEY
  question_analysis_model_id: gemma-4-31b-it
  query_planning_model_id: gemma-4-31b-it
  candidate_filter_model_id: gemma-4-31b-it
  article_selection_model_id: gemma-4-31b-it
  metric_extraction_model_id: gemma-4-31b-it
  analysis_model_id: gemma-4-31b-it
  summary_model_id: gemma-4-31b-it
  max_output_tokens: 100000
  temperature: 0.25
  gemini_retry_attempts: 5
  gemini_retry_backoff_seconds: 3.0

search:
  provider: openai_web_search
  api_key_env: openai_news_api
  web_search_model_id: gpt-5.4-mini
  # Reasoning effort for reasoning models only: none, minimal, low, medium, high, xhigh.
  # Leave empty or remove this key for non-reasoning models like gpt-4.1.
  web_search_reasoning_effort: low
  # Limits built-in OpenAI web-search calls per search job.
  web_search_max_tool_calls: 3
  # Keeps the final candidate JSON concise.
  web_search_text_verbosity: low
  # Use OpenAI web_search API-level domain filtering instead of prompt-only site: filters.
  web_search_use_allowed_domains: true
  web_search_include_sources: true
  web_search_tool_choice: required
  web_search_search_context_size: medium
  web_search_use_site_query_filters: false
  adaptive_react_enabled: true
  adaptive_react_repair_prompt: web_search/adaptive_react_repair_planner
  adaptive_react_repair_max_tool_calls: 3
  adaptive_react_max_repair_actions: 5
  adaptive_react_max_candidates_per_outlet: 2
  days_back: 60
  # The broad search can return up to one relevant article per configured outlet.
  max_sources: 20
  # outlet count + 1 gives one broad recall job plus one job per outlet.
  max_search_calls_per_run: 1
  # Prompt variants live in config/prompts/web_search.
  web_search_prompt: web_search/web_search_research_new

analysis:
  enabled: true
  run_parallel: true
  model_step: analysis
  evidence_based_prompt: analysis/evidence_based_analysis
  speculative_red_team_prompt: analysis/speculative_red_team_analysis
  max_output_tokens: 4000

outlets_file: outlets/openai_outlets.yaml
