model:
  backend: gemini
  api_key_env: GEMINI_API_KEY
  question_analysis_model_id: gemma-4-31b-it
  query_planning_model_id: gemma-4-31b-it
  candidate_filter_model_id: gemma-4-31b-it
  article_selection_model_id: gemma-4-31b-it
  metric_extraction_model_id: gemma-4-31b-it
  summary_model_id: gemma-4-31b-it
  max_output_tokens: 2048
  temperature: 0.1
  request_timeout_seconds: 240

search:
  provider: free_news_api
  days_back: 90
  max_sources: 5
  max_search_calls_per_run: 0
  candidate_pool_size: 25
  request_timeout_seconds: 30
  user_agent: "news-agent/0.1 (+local learning project)"
  api_key_env: news_triage_codex_app
  base_url: https://api.freenewsapi.io

outlets_file: outlets/free_outlets.yaml

