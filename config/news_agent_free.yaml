# Free baseline config.
#
# This config avoids OpenAI entirely:
# - retrieval uses Google News RSS,
# - model calls currently use the placeholder heuristic backend,
# - no API key is required.
#
# Later we can replace `backend: heuristic` with a local Gemma backend
# once the local runner is installed and tested.

model:
  backend: heuristic
  api_key_env: ""
  question_analysis_model_id: heuristic
  query_planning_model_id: heuristic
  candidate_filter_model_id: heuristic
  article_selection_model_id: heuristic
  metric_extraction_model_id: heuristic
  summary_model_id: heuristic
  max_output_tokens: 0
  temperature: 0.0

search:
  provider: google_news_rss
  days_back: 90
  max_sources: 6
  max_search_calls_per_run: 1
  candidate_pool_size: 10
  request_timeout_seconds: 12
  user_agent: "news-agent/0.1 (+local learning project)"
  # Keep direct publisher RSS only; Google News URLs often redirect to consent pages in Europe.
  allow_google_news_fallback: false

outlets_file: outlets/free_outlets.yaml

