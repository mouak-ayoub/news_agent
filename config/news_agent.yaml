# Runtime settings live outside the code so we can swap the model id,
# source registry, and limits without editing Python.
#
# YAML is used here because you asked for a config format that is easy to read
# and edit in the `config/` folder.

model:
  backend: openai
  api_key_env: NEWS_AGENT_KEY
  research_model_id: gpt-4.1
  model_id: gpt-5
  max_output_tokens: 5000
  temperature: 0.2
  fallback_to_heuristic: true

search:
  provider: openai_web_search
  days_back: 7
  # The broad search can return up to one relevant article per configured outlet.
  max_sources: 20
  # V1 uses one broad outlet-aware search call per run.
  max_search_calls_per_run: 1

budget:
  max_monthly_spend_usd: 10.0
  max_run_spend_usd: 0.15
  input_cost_per_million: 0.25
  output_cost_per_million: 2.0
  web_search_cost_per_call: 0.01
  ledger_path: data/usage_guard.json

outlets:
  - name: Reuters
    domain: reuters.com
    country: United Kingdom
    medium_type: wire service
    orientation: center
    notes: Global wire service often useful as a baseline factual source.
  - name: CNN
    domain: cnn.com
    country: United States
    medium_type: TV / digital
    orientation: center-left
    notes: Mainstream US broadcaster.
  - name: Fox News
    domain: foxnews.com
    country: United States
    medium_type: TV / digital
    orientation: right
    notes: Conservative US broadcaster.
  - name: Le Monde
    domain: lemonde.fr
    country: France
    medium_type: newspaper
    orientation: center-left
    notes: Mainstream French paper.
  - name: Le Figaro
    domain: lefigaro.fr
    country: France
    medium_type: newspaper
    orientation: center-right
    notes: French center-right contrast.
  - name: Al Jazeera
    domain: aljazeera.com
    country: Qatar
    medium_type: broadcaster / digital
    orientation: mixed
    notes: Strong regional framing value.
  - name: Jerusalem Post
    domain: jpost.com
    country: Israel
    medium_type: newspaper / digital
    orientation: center-right
    notes: Useful for Israeli framing.
  - name: Haaretz
    domain: haaretz.com
    country: Israel
    medium_type: newspaper / digital
    orientation: left
    notes: Contrast with other Israeli outlets.
  - name: Tasnim News
    domain: tasnimnews.com
    country: Iran
    medium_type: state-aligned digital
    orientation: state-aligned
    notes: Useful for Iranian framing.
  - name: El Pais
    domain: elpais.com
    country: Spain
    medium_type: newspaper
    orientation: center-left
    notes: Spanish mainstream paper.
  - name: ABC
    domain: abc.es
    country: Spain
    medium_type: newspaper
    orientation: center-right
    notes: Spanish center-right contrast.
